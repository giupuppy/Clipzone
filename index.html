<!DOCTYPE html>
<html lang="it">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClipZone</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #0a0a0a;
            color: white;

            text-align: center;
        }
        .logo {
            max-width: 250px;

<body>
    <img src="IMG_20260410_194842.jpg" alt="Logo ClipZone" class="logo">

</html>
